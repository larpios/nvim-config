name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LuaJIT
        run: sudo apt-get install -y luajit

      - name: Run unit tests
        run: luajit tests/ccc_format_spec.lua

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Lua formatting with stylua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .

  startup:
    name: Config Startup Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Cache lazy.nvim plugins
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nvim/lazy
          key: ${{ runner.os }}-lazy-${{ hashFiles('lazy-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-lazy-

      - name: Sync plugins
        run: nvim --headless -u init.lua "+Lazy! sync" +qa

      - name: Check config startup
        run: nvim --headless -u init.lua +qa
